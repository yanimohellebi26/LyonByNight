name: Weekly Event Scraper

on:
  schedule:
    # Every Monday at 06:00 UTC (08:00 Paris time)
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm install

      - name: Install tsx
        run: npm install -g tsx

      - name: Run event scraper
        run: npx tsx scripts/scrape-events.ts

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/events.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git commit -m "chore: weekly event scrape update"
          git push
